<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Blackstone AI</title>

    <meta name="author" content="Blackstone AI" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.blackstoneai.co/" />
    <meta property="og:title" content="Blackstone AI | AI-Powered Business Automation Platform" />
    <meta property="og:description" content="Grow your business using AI automation tools. WhatsApp marketing, CRM, chatbot, Instagram automation, restaurant & salon software. Book free demo today." />
    <meta property="og:image" content="https://www.blackstoneai.co/images/hero-illustration.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png" />

    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Structured Data (JSON-LD) - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Blackstone AI",
        "alternateName": "Blackstone AI Automation",
        "url": "https://www.blackstoneai.co",
        "logo": "https://www.blackstoneai.co/images/hero-illustration.png",
        "sameAs": [
          "https://www.instagram.com/blackstoneai",
          "https://www.facebook.com/blackstoneai",
          "https://www.linkedin.com/company/blackstoneai"
        ],
        "description": "AI-powered business automation platform for WhatsApp, CRM, chatbot, and digital solutions worldwide.",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+65-81798737",
          "contactType": "sales",
          "areaServed": "Global",
          "availableLanguage": ["English", "Hindi"]
        }
      }
    </script>

    <!-- Structured Data (JSON-LD) - SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Blackstone AI",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR",
          "description": "Free trial available"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "250"
        }
      }
    </script>

    <!-- Structured Data (JSON-LD) - FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Blackstone AI?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Blackstone AI is an AI-powered business automation platform that helps businesses automate WhatsApp, Instagram, Facebook conversations, bookings, orders, follow-ups, and customer support."
            }
          },
          {
            "@type": "Question",
            "name": "How does WhatsApp automation work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Our WhatsApp Business Automation allows you to send auto-replies, run bulk campaigns, capture leads, and send reminders—all automated through our intelligent AI platform."
            }
          },
          {
            "@type": "Question",
            "name": "Is Blackstone AI suitable for small businesses?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Absolutely! Blackstone AI is built specifically for startups, salons, restaurants, retailers, and service businesses of all sizes. Our affordable pricing makes it accessible for small businesses."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer a free trial?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! We offer a free trial so you can experience the full power of our AI automation platform before committing. Book a free demo to get started."
            }
          },
          {
            "@type": "Question",
            "name": "Which industries does Blackstone AI support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Blackstone AI supports salons, restaurants, retail stores, service businesses, healthcare, education, and more with industry-specific automation solutions."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
